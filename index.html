<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cNFT.FUN</title>
  <link rel="icon" type="image/svg+xml" href="assets/cnft.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* 浅色主题：与半透明白底搭配 */
      /* 表单、缩略图底等略实于页面大底，避免与卡片融在一起 */
      --bg: #eef1f8;
      --surface: rgba(255, 255, 255, 0.92);
      --border: #d0d6e4;
      --text: #12151d;
      --muted: #5c6475;
      --accent: #9945ff;
      --accent-dim: #7c3aed;
      --mint: #0b9f6e;
      --danger: #e11d48;
      --radius: 12px;
      /* 查询区、结果卡片、翻页条等同宽 */
      --content-max: 1000px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(1200px 760px at 12% -12%, rgba(34, 211, 238, 0.32) 0%, rgba(34, 211, 238, 0) 58%),
        radial-gradient(980px 620px at 88% 118%, rgba(99, 102, 241, 0.34) 0%, rgba(99, 102, 241, 0) 64%),
        radial-gradient(700px 420px at 52% 48%, rgba(14, 165, 233, 0.14) 0%, rgba(14, 165, 233, 0) 72%),
        linear-gradient(158deg, #02050b 0%, #060b14 36%, #091226 68%, #04070f 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: linear-gradient(
        180deg,
        rgba(8, 12, 22, 0.58) 0%,
        rgba(10, 16, 30, 0.54) 100%
      );
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      text-align: center;
    }

    header {
      margin-bottom: 1.75rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    .site-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem 1rem;
      flex-wrap: wrap;
    }

    .site-wordmark {
      margin: 0;
      font-family: "Syne", "DM Sans", system-ui, sans-serif;
      font-size: clamp(1.95rem, 5.8vw, 2.75rem);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1;
      text-transform: none;
      background: linear-gradient(
        108deg,
        #0f172a 0%,
        #5b21b6 38%,
        #7c3aed 55%,
        #059669 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: #12151d;
    }

    @supports ((-webkit-background-clip: text) or (background-clip: text)) {
      .site-wordmark {
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    }

    .site-logo {
      height: 52px;
      width: auto;
      max-width: min(100%, 280px);
      object-fit: contain;
      object-position: center;
      flex-shrink: 0;
      display: block;
      border: none;
      outline: none;
      box-shadow: none;
      border-radius: 0;
      background: transparent;
      /* 去掉方形画布四角（内嵌 PNG 多为方图） */
      -webkit-clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      max-width: var(--content-max);
      margin-left: auto;
      margin-right: auto;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 1rem;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.75rem;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.45;
      text-align: left;
    }

    #addresses {
      min-height: 104px;
    }

    select {
      text-align: left;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(153, 69, 255, 0.2);
    }

    .pwd-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .pwd-modal[hidden] {
      display: none !important;
    }

    .pwd-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
    }

    .pwd-modal-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.12);
    }

    .pwd-modal-card p {
      margin: 0 0 1rem;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.5;
    }

    .pwd-modal-card input[type="password"] {
      width: 100%;
      margin-bottom: 1rem;
    }

    .pwd-modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .img-lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    .img-lightbox[hidden] {
      display: none !important;
    }

    .img-lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      cursor: zoom-out;
    }

    .img-lightbox-img {
      position: relative;
      z-index: 1;
      max-width: min(96vw, 920px);
      max-height: min(88vh, 920px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 16px 56px rgba(15, 23, 42, 0.18);
      border: 1px solid var(--border);
    }

    .img-lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 2;
      margin: 0;
      padding: 0.35rem 0.65rem;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }

    .img-lightbox-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .nft-thumb-wrap.nft-thumb-zoom {
      cursor: zoom-in;
    }

    .nft-thumb-wrap.nft-thumb-zoom:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.25rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s, background-color 0.15s ease,
        color 0.15s ease, filter 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: rgb(192, 255, 56);
      color: #0c0d12;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgb(192, 255, 56);
      color: #0c0d12;
    }

    .progress {
      font-size: 0.85rem;
      color: var(--mint);
      margin-top: 0.75rem;
      min-height: 1.25em;
      text-align: center;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      width: 100%;
    }

    .chart-panel {
      text-align: left;
    }

    .chart-head {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .chart-title {
      margin: 0;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chart-title-hint {
      display: block;
      margin-top: 0.22rem;
      font-size: 0.65rem;
      font-weight: 500;
      font-style: italic;
      text-transform: none;
    }

    .chart-scroll {
      overflow-x: auto;
      padding-bottom: 0.25rem;
    }

    .chart-svg {
      display: block;
      min-width: 900px;
      width: 100%;
      height: auto;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .holders-panel {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .holders-total {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding: 0.7rem 0.9rem;
      border: 1px solid rgba(11, 159, 110, 0.28);
      border-radius: 8px;
      background: rgba(20, 241, 149, 0.1);
    }

    .holders-total-label {
      color: var(--text);
      font-weight: 700;
    }

    .holders-total-count {
      color: var(--mint);
      font-family: "JetBrains Mono", monospace;
      font-size: 1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .holders-total-text {
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 700;
    }

    .holders-total-sep {
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 700;
    }

    .chart-axis,
    .chart-grid {
      stroke: #cfd5e2;
      stroke-width: 1;
    }

    .chart-grid {
      opacity: 0.78;
    }

    .chart-line {
      fill: none;
      stroke: var(--mint);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-point {
      fill: rgb(192, 255, 56);
      stroke: var(--mint);
      stroke-width: 2;
      cursor: pointer;
      animation: chartPointPulse 1.45s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .chart-point:focus {
      outline: none;
      stroke: var(--accent);
      stroke-width: 3;
    }

    @keyframes chartPointPulse {
      0%,
      100% {
        opacity: 0.72;
        transform: scale(0.94);
      }
      50% {
        opacity: 1;
        transform: scale(1.22);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .chart-point {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }

    .chart-label,
    .chart-value {
      fill: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
    }

    .chart-label {
      font-size: 11px;
    }

    .chart-value {
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .chart-y-label {
      fill: var(--muted);
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 100%;
      max-width: var(--content-max);
      text-align: left;
    }

    .card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(153, 69, 255, 0.06);
    }

    .head-main {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    .addr-serial {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--mint);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .addr {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      word-break: break-all;
    }

    .addr a {
      color: var(--text);
      text-decoration: none;
    }

    .addr a:hover {
      color: var(--mint);
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: var(--border);
      color: var(--muted);
    }

    .badge.ok {
      background: rgba(20, 241, 149, 0.15);
      color: var(--mint);
    }

    .badge.err {
      background: rgba(244, 63, 94, 0.15);
      color: var(--danger);
    }

    .card-body {
      padding: 0;
    }

    .err-msg {
      padding: 1rem 1.25rem;
      color: var(--danger);
      font-size: 0.9rem;
    }

    /* 整块 NFT 网格：一个基准字号 + em，缩略图与文字同比缩小/随页面缩放 */
    .nft-list {
      list-style: none;
      margin: 0;
      padding: 0.65em 0.85em 0.85em;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.55em 0.65em;
      font-size: 0.72rem;
    }

    .nft-list li {
      display: grid;
      grid-template-columns: auto 3.5em;
      grid-template-rows: auto auto;
      align-items: start;
      column-gap: 0.4em;
      row-gap: 0.35em;
      padding: 0.5em 0.55em;
      border: 1px solid var(--border);
      border-radius: 0.5em;
      background: rgba(255, 255, 255, 0.55);
      font-size: 1em;
      line-height: 1.35;
      min-width: 0;
      box-sizing: border-box;
    }

    .nft-list li .nft-idx {
      grid-column: 1;
      grid-row: 1;
      align-self: start;
      white-space: nowrap;
      min-width: 1.75em;
    }

    .nft-list li .nft-thumb-wrap {
      grid-column: 2;
      grid-row: 1;
      width: 3.5em;
      height: 3.5em;
      border-radius: 0.45em;
    }

    .nft-list li .nft-main {
      grid-column: 1 / -1;
      grid-row: 2;
    }

    .nft-list.nft-list--rows {
      grid-template-columns: 1fr;
      gap: 0.45em;
      font-size: 0.78rem;
    }

    .nft-list.nft-list--rows li {
      grid-template-columns: 4.25em minmax(0, 1fr);
      grid-template-rows: auto;
      align-items: center;
      column-gap: 0.5em;
      padding: 0.55em 0.7em;
    }

    .nft-list.nft-list--rows li .nft-idx {
      display: none;
    }

    .nft-list.nft-list--rows li .nft-thumb-wrap {
      grid-column: 1;
      grid-row: 1;
      width: 4.25em;
      height: 4.25em;
    }

    .nft-list.nft-list--rows li .nft-main {
      grid-column: 2;
      grid-row: 1;
      display: grid;
      grid-template-columns: minmax(9rem, 0.42fr) minmax(0, 1fr);
      align-items: center;
      gap: 0.45em;
      font-size: 1.18em;
    }

    .nft-list.nft-list--rows .nft-collection {
      color: var(--text);
    }

    .nft-list.nft-list--rows .nft-name {
      font-weight: 700;
    }

    .nft-list.nft-list--rows .nft-collection a {
      color: var(--mint);
      font-weight: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .nft-list.nft-list--rows .nft-solscan-link {
      color: var(--mint);
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: nowrap;
    }

    .nft-list.nft-list--rows .nft-collection a:hover {
      text-decoration: underline;
    }

    .nft-list .nft-thumb-err {
      font-size: 0.65em;
    }

    .nft-thumb-wrap {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    .nft-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1);
      transform-origin: center center;
      transition: transform 0.28s ease;
    }

    .nft-thumb-wrap.nft-thumb-zoom:hover .nft-thumb:not([hidden]) {
      transform: scale(1.14);
    }

    @media (prefers-reduced-motion: reduce) {
      .nft-thumb {
        transition: none;
      }

      .nft-thumb-wrap.nft-thumb-zoom:hover .nft-thumb:not([hidden]) {
        transform: scale(1);
      }
    }

    .nft-thumb[hidden] {
      display: none !important;
    }

    .nft-thumb-skel {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        rgba(210, 216, 230, 0.95) 0%,
        rgba(236, 239, 247, 0.98) 45%,
        rgba(210, 216, 230, 0.95) 90%
      );
      background-size: 200% 100%;
      animation: nftSkel 1.2s ease-in-out infinite;
    }

    .nft-thumb-skel[hidden] {
      display: none !important;
    }

    @keyframes nftSkel {
      0% {
        background-position: 100% 0;
      }
      100% {
        background-position: -100% 0;
      }
    }

    .nft-thumb-err {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      padding: 0.25rem;
      line-height: 1.2;
    }

    .nft-thumb-err[hidden] {
      display: none !important;
    }

    .nft-idx {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 2em;
    }

    .nft-name {
      word-break: break-word;
    }

    .nft-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.15em;
    }

    .nft-collection {
      font-size: 0.92em;
      color: var(--muted);
      line-height: 1.35;
    }

    .empty-nft {
      padding: 1rem 1.25rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .nft-list li.nft-row--missing {
      opacity: 0.48;
      filter: grayscale(1);
    }

    .nft-list li.nft-row--missing .nft-name {
      color: var(--muted);
    }

    /* 标题一行、副标题（合集 / 未持有等）一行，避免词中间折断；过长省略 */
    .nft-list .nft-name,
    .nft-list .nft-collection {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: normal;
      overflow-wrap: normal;
    }

    .collect-progress {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .collect-progress-counts {
      font-size: 0.88rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      margin-bottom: 0.45rem;
    }

    .collect-progress-bar-wrap {
      height: 9px;
      border-radius: 999px;
      background: #e4e8f2;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .collect-progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-dim), var(--mint));
      transition: width 0.4s ease;
    }

    .collect-progress--err,
    .collect-progress--muted {
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .collect-progress--err {
      color: var(--danger);
    }

    .collect-progress--muted {
      color: var(--muted);
    }

    @keyframes goldTownhallPop {
      0% {
        opacity: 0;
        transform: scale(0.94);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .gold-townhall-banner {
      margin: 0;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.5);
      background: linear-gradient(
        125deg,
        rgba(212, 175, 55, 0.28) 0%,
        rgba(74, 58, 18, 0.45) 42%,
        rgba(212, 175, 55, 0.15) 100%
      );
      box-shadow: inset 0 1px 0 rgba(255, 230, 160, 0.35);
      text-align: left;
      animation: goldTownhallPop 0.42s ease-out;
    }

    .gold-townhall-banner-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffe08a;
      text-shadow: 0 0 20px rgba(255, 215, 100, 0.35);
    }

    .gold-townhall-banner-detail {
      margin-top: 0.35rem;
      font-size: 0.86rem;
      line-height: 1.45;
      color: #f0e0b0;
      font-variant-numeric: tabular-nums;
    }

    @keyframes antiSlopBannerPop {
      0% {
        opacity: 0;
        transform: scale(0.96);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .raiku-anti-slop-banner {
      margin: 0;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid rgb(160, 220, 48);
      background: rgb(192, 255, 56);
      text-align: left;
      animation: antiSlopBannerPop 0.42s ease-out;
    }

    .raiku-anti-slop-banner-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #07080c;
    }

    .raiku-anti-slop-banner-detail {
      margin-top: 0.35rem;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #0a0b10;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    @media (prefers-reduced-motion: reduce) {
      .gold-townhall-banner {
        animation: none;
      }

      .raiku-anti-slop-banner {
        animation: none;
      }
    }

    .gold-confetti-layer {
      position: fixed;
      inset: 0;
      z-index: 9995;
      pointer-events: none;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.55s ease;
    }

    .gold-confetti-layer--out {
      opacity: 0;
    }

    @keyframes goldConfettiFall {
      0% {
        transform: translate3d(0, -20px, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--dx), calc(100vh + 20px), 0)
          rotate(var(--rot));
        opacity: 0.9;
      }
    }

    .gold-confetti-piece {
      position: absolute;
      top: -24px;
      border-radius: 2px;
      opacity: 0.96;
      animation-name: goldConfettiFall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      will-change: transform;
    }

    .site-footer {
      margin-top: 2rem;
      margin-left: auto;
      margin-right: auto;
      max-width: 960px;
      font-size: 0.85rem;

      let uiLang = "en";
      try {
        const s = localStorage.getItem(LANG_KEY);
        if (s === "zh" || s === "en") uiLang = s;
      } catch (e) {}

      function t(key, vars) {
        const table = STR[uiLang] || STR.en;
        let s = table[key];
        if (s == null) s = STR.en[key] != null ? STR.en[key] : key;
        s = String(s);
        if (vars) {
          Object.keys(vars).forEach(function (k) {
            s = s.split("{" + k + "}").join(String(vars[k]));
          });
        }
        return s;
      }

      function formatNumber(value, maxFractionDigits) {
        var n = Number(value);
        if (!isFinite(n)) return String(value);
        return n.toLocaleString(uiLang === "zh" ? "zh-CN" : "en-US", {
          maximumFractionDigits:
            maxFractionDigits == null ? 0 : maxFractionDigits,
        });
      }

      function applyStaticI18n() {
        document.documentElement.setAttribute(
          "lang",
          uiLang === "zh" ? "zh-CN" : "en"
        );
        document.title = t("pageTitle");
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          const k = el.getAttribute("data-i18n");
          if (k) el.textContent = t(k);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
          const k = el.getAttribute("data-i18n-placeholder");
          if (k) el.setAttribute("placeholder", t(k));
        });
        document.querySelectorAll("[data-i18n-title]").forEach(function (el) {
          const k = el.getAttribute("data-i18n-title");
          if (k) el.setAttribute("title", t(k));
        });
        const av = document.querySelector("[data-i18n-alt-avatar]");
        if (av) av.setAttribute("alt", t("altAvatar"));
        if (langEnBtn) langEnBtn.setAttribute("aria-pressed", uiLang === "en" ? "true" : "false");
        if (langZhBtn) langZhBtn.setAttribute("aria-pressed", uiLang === "zh" ? "true" : "false");
        if (imgLightboxEl) imgLightboxEl.setAttribute("aria-label", t("imgLightboxAria"));
        renderBenchmarkChart();
        renderHoldersPanel();
      }

        if (lang !== "en" && lang !== "zh") return;
        uiLang = lang;

      function renderBenchmarkChart() {
        if (!benchmarkChartEl) return;
        var data = BENCHMARK_COLLECTION_CHART_DATA;
        var width = 980;
        var height = 325;
        var pad = { top: 34, right: 34, bottom: 62, left: 58 };
        var plotW = width - pad.left - pad.right;
        var plotH = height - pad.top - pad.bottom;
        var yTicks = [0, 400, 500, 600, 700, 800];
        function yToPx(value) {
          var seg = 0;
          var ratio = 0;
          for (var i = 0; i < yTicks.length - 1; i++) {
            if (value <= yTicks[i + 1]) {
              seg = i;
              ratio = (value - yTicks[i]) / (yTicks[i + 1] - yTicks[i]);
              break;
            }
          }
          if (value >= yTicks[yTicks.length - 1]) {
            seg = yTicks.length - 2;
            ratio = 1;
          }
          ratio = Math.max(0, Math.min(1, ratio));
          var tickStep = plotH / (yTicks.length - 1);
          return pad.top + plotH - (seg + ratio) * tickStep;
        }
        benchmarkChartEl.innerHTML = "";
        benchmarkChartEl.setAttribute("aria-label", t("benchmarkChartAria"));

        yTicks.forEach(function (y) {
          var py = yToPx(y);
          var grid = setSvgAttrs(svgEl("line"), {
            class: "chart-grid",
            x1: pad.left,
            y1: py,
            x2: width - pad.right,
            y2: py,
          });
          benchmarkChartEl.appendChild(grid);
          appendSvgText(benchmarkChartEl, String(y), {
            class: "chart-y-label",
            x: pad.left - 12,
            y: py + 4,
            "text-anchor": "end",
          });
        });

        benchmarkChartEl.appendChild(
          setSvgAttrs(svgEl("line"), {
            class: "chart-axis",
            x1: pad.left,
            y1: pad.top + plotH,
            x2: width - pad.right,
            y2: pad.top + plotH,
          })
        );
        benchmarkChartEl.appendChild(
          setSvgAttrs(svgEl("line"), {
            class: "chart-axis",
            x1: pad.left,
            y1: pad.top,
            x2: pad.left,
            y2: pad.top + plotH,
          })
        );

        var points = data.map(function (d, i) {
          var x =
            pad.left +
            (data.length === 1 ? 0 : (plotW * i) / (data.length - 1));
          var y = yToPx(d.value);
          return { x: x, y: y, item: d };
        });
        var pathD = points
          .map(function (p, i) {
            return (i === 0 ? "M" : "L") + p.x + " " + p.y;
          })
          .join(" ");
        benchmarkChartEl.appendChild(
          setSvgAttrs(svgEl("path"), {
            class: "chart-line",
            d: pathD,
          })
        );

        points.forEach(function (p) {
          appendSvgText(benchmarkChartEl, String(p.item.value), {
            class: "chart-value",
            x: p.x,
            y: p.y - 12,
            "text-anchor": "middle",

          var dot = setSvgAttrs(svgEl("circle"), {
            class: "chart-point",
            cx: p.x,
            cy: p.y,
            r: 4.5,
            tabindex: "0",
            role: "button",
            "aria-label":
              t("benchmarkChartPointTitle") +

          });
          var title = svgEl("title");
          title.textContent =
            p.item.name + " · " + p.item.value + " · " + p.item.date;
          dot.appendChild(title);
          dot.addEventListener("click", function () {
            showBenchmarkChartImage(p.item);

          dot.addEventListener("keydown", function (ev) {
            if (ev.key !== "Enter" && ev.key !== " ") return;

          benchmarkChartEl.appendChild(dot);
          var label = appendSvgText(benchmarkChartEl, p.item.name, {
            class: "chart-label",
            x: p.x,
            y: pad.top + plotH + 26,
            "text-anchor": "middle",
          });
          var labelTitle = svgEl("title");
          labelTitle.textContent = p.item.name;
          label.appendChild(labelTitle);
        });

      function checkMinuteCooldown() {
        let last = 0;
        try {
          last = parseInt(
            sessionStorage.getItem(QUERY_COOLDOWN_STORAGE_KEY),
            10
          );
        } catch (e) {
          last = 0;
        }
        if (!last || isNaN(last)) last = 0;
        const now = Date.now();
        const elapsed = now - last;
        if (last && elapsed < QUERY_COOLDOWN_MS) {
          const sec = Math.ceil((QUERY_COOLDOWN_MS - elapsed) / 1000);
          return {
            ok: false,
            msg: t("cooldownWait", { sec: String(sec) }),
          };
        }
        return { ok: true };
      }

      /**
       * 将 ipfs:// 等 URI 转为浏览器可请求的 HTTPS（链上元数据常见写法）。
       */
      function normalizeResolvableUri(uri) {
        if (uri == null) return null;
        var s = String(uri).trim();
        if (!s) return null;
        if (s.indexOf("ipfs://") === 0) {
          var h = s.slice("ipfs://".length).replace(/^ipfs\//, "");
          return "https://ipfs.io/ipfs/" + h;
        }
        return s;
      }

      /**
       * 仅从 Helius DAS 返回的 content 中同步解析图像候选（不发起额外请求）。
       */
      function imageUrlFromContentSync(item) {
        var c = item.content;
        if (!c) return null;
        if (c.links && c.links.image) {
          var u = normalizeResolvableUri(c.links.image);
          if (u) return u;
        }
        if (Array.isArray(c.files)) {
          for (var i = 0; i < c.files.length; i++) {
            var f = c.files[i];
            if (!f) continue;
            var mime = String(f.mime || "").toLowerCase();
            var cand = f.cdn_uri || f.uri;
            if (!cand) continue;
            if (
              mime.indexOf("image/") === 0 ||
              /\.(png|jpe?g|gif|webp|svg)(\?|#|$)/i.test(String(cand))
            ) {
              return normalizeResolvableUri(cand);
            }
          }
        }
        return null;
      }

      async function fetchJsonMetadataFromUri(jsonUri) {
        var u = normalizeResolvableUri(jsonUri);
        if (!u) return null;
        var res = await fetch(u, { mode: "cors" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      }

      async function imageUrlFromAsset(item) {
        var syncImg = imageUrlFromContentSync(item);
        if (syncImg) return syncImg;
        var jsonUri = item && item.content && item.content.json_uri;
        jsonUri = jsonUri != null ? String(jsonUri).trim() : "";
        if (!jsonUri) return "";
        var remote = await fetchJsonMetadataFromUri(jsonUri);
        var rawImg =
          remote && (remote.image || remote.properties?.files?.[0]?.uri);
        return normalizeResolvableUri(rawImg) || "";
      }

      function findBenchmarkItemForChartPoint(items, chartItem) {
        var targetKey = normalizeCollectionNameKey(
          benchmarkChartFullCollectionName(chartItem)
        );
        var targetNo = String(chartItem.name || "").replace(/^#/, "");
        var targetNoRe = new RegExp(
          "(^|[^0-9])#" + targetNo + "([^0-9]|$)",
          "i"
        );
        function itemTextMatchesChartPoint(item) {
          var texts = collectionNameStringsFromAsset(item).slice();
          texts.push(assetDisplayName(item));
          for (var ti = 0; ti < texts.length; ti++) {
            var raw = String(texts[ti] || "");
            var key = normalizeCollectionNameKey(raw);
            if (key === targetKey) return true;
            if (key.indexOf(targetKey) !== -1) return true;
            if (targetNo && targetNoRe.test(raw)) return true;
          }
          return false;
        }
        for (var i = 0; i < items.length; i++) {
          if (itemTextMatchesChartPoint(items[i])) return items[i];
        }
        return null;
      }

            var chartItem = BENCHMARK_COLLECTION_CHART_DATA[i];
            if (benchmarkChartImageCache.has(chartItem.name)) continue;

      /**
       * 在 .nft-thumb-wrap 内挂载缩略图；列表与基准对照格共用。
       */
      function hydrateNftThumbInWrap(wrap, item) {
        var imgEl = wrap.querySelector(".nft-thumb");
        var skelEl = wrap.querySelector(".nft-thumb-skel");
        var errEl = wrap.querySelector(".nft-thumb-err");
        if (!imgEl || !skelEl || !errEl) return;

        function hideSkel() {
          skelEl.hidden = true;
        }

        function showImg(src) {
          imgEl.removeAttribute("hidden");
          imgEl.src = src;
          imgEl.alt = t("imgAltNft");
        }

        function showErr() {
          hideSkel();
          errEl.hidden = false;
          errEl.textContent = t("thumbNoImg");
        }

        var syncImg = imageUrlFromContentSync(item);
        if (syncImg) {
          imgEl.onload = function () {
            hideSkel();
          };
          imgEl.onerror = function () {
            showErr();
          };
          showImg(syncImg);
          if (imgEl.complete && imgEl.naturalWidth > 0) hideSkel();
          return;
        }

        var jsonUri = item.content && item.content.json_uri;
        jsonUri = jsonUri != null ? String(jsonUri).trim() : "";
        if (!jsonUri) {
          showErr();
          return;
        }

        fetchJsonMetadataFromUri(jsonUri)
          .then(function (remote) {
            var rawImg =
              remote && (remote.image || remote.properties?.files?.[0]?.uri);
            if (rawImg) {
              var imgU = normalizeResolvableUri(rawImg);
              if (imgU) {
                imgEl.onload = function () {
                  hideSkel();
                };
                imgEl.onerror = function () {
                  showErr();
                };
                showImg(imgU);
                if (imgEl.complete && imgEl.naturalWidth > 0) hideSkel();
                return;
              }
            }
            showErr();
          })
          .catch(function () {
            showErr();
          });
      }

      function isCompressed(item) {
        return !!(item.compression && item.compression.compressed);
      }

      function filterItems(items, onlyCompressed) {
        if (!onlyCompressed) return items;
        return items.filter(isCompressed);
      }

      function normalizeEpochToMs(v) {
        if (v == null || v === "") return 0;
        if (typeof v === "string") {
          var st = v.trim();
          if (/^\d+$/.test(st)) {
            var n = parseInt(st, 10);
            if (!isNaN(n) && n > 0) return n < 1e12 ? n * 1000 : n;
            return 0;
          }
          var d = Date.parse(st);
          return isNaN(d) ? 0 : d;
        }
        var num = Number(v);
        if (isNaN(num) || num <= 0) return 0;
        return num < 1e12 ? Math.floor(num * 1000) : Math.floor(num);
      }

      /**
       * 用于列表排序：优先所有权相关时间（若接口提供），否则退回创建时间等。
       */
      function assetAcquireSortMs(item) {
        if (!item) return 0;
        var o = item.ownership;
        if (o && typeof o === "object") {
          var ocand =
            o.acquired_at ??
            o.acquire_timestamp ??
            o.last_transfer_timestamp ??
            o.timestamp ??
            o.updated_at;
          var om = normalizeEpochToMs(ocand);
          if (om > 0) return om;
        }
        var cm = normalizeEpochToMs(item.created_at);
        if (cm > 0) return cm;
        cm = normalizeEpochToMs(item.updated_at ?? item.timestamp);
        if (cm > 0) return cm;
        if (item.compression && item.compression.seq != null) {
          var s = Number(item.compression.seq);
          if (!isNaN(s)) return s;
        }
        return 0;
      }

      function sortAssetsByAcquireTimeAsc(items) {
        return items.slice().sort(function (a, b) {
          var da = assetAcquireSortMs(a);
          var db = assetAcquireSortMs(b);
          if (da !== db) return da - db;
          var ida = a && a.id ? String(a.id) : "";
          var idb = b && b.id ? String(b.id) : "";
          return ida < idb ? -1 : ida > idb ? 1 : 0;
        });
      }

      const RAIKU_COLLECTION_NEEDLE = "raiku";

      /** 合集名称中含此子串（不区分大小写）即视为 Raiku Townhall Gold 金色合集。 */
      const RAIKU_TOWNHALL_GOLD_SUBSTR = "raiku townhall gold";

      /** 基准钱包：以其持仓中出现的「合集显示名称」（规范化后，非资产 id）集合为分母。 */
      const RAIKU_BENCHMARK_WALLET =
        "FjFuq9Di4vjsFE67ZDiMQ66pJpP9ht2CEtXhPDY6hYt2";

      /** 官方 Raiku 分发：仅当 DAS 资产上的 authority / 已验证创作者 / 铸币权限与此地址一致时，名称含 Raiku 的 NFT 才计入。 */
      const RAIKU_OFFICIAL_DISTRIBUTOR =
        "J9gEzziCaBtyjtd5fcHLq6AK7QeiMJBf8jru6VykFEQo";

      function pushNonEmpty(arr, s) {
        if (s == null) return;
        var t = String(s).trim();
        if (t) arr.push(t);
      }

      function collectionNameStringsFromAsset(item) {
        var out = [];
        var grouping = item.grouping;
        if (Array.isArray(grouping)) {
          grouping.forEach(function (g) {
            if (!g || g.group_key !== "collection") return;
            var cm = g.collection_metadata;
            if (cm && typeof cm === "object") {
              pushNonEmpty(out, cm.name);
              pushNonEmpty(out, cm.symbol);
            }
          });
        }
        var meta = item.content && item.content.metadata;
        if (meta && meta.collection != null) {
          var c = meta.collection;
          if (typeof c === "string") pushNonEmpty(out, c);
          else if (typeof c === "object") {
            pushNonEmpty(out, c.name);
            pushNonEmpty(out, c.family);
          }
        }
        return out;
      }

      function collectionSupplyFromAssetMetadata(item) {
        var grouping = item.grouping;
        if (!Array.isArray(grouping)) return null;
        for (var i = 0; i < grouping.length; i++) {
          var g = grouping[i];
          if (!g || g.group_key !== "collection") continue;
          var cm = g.collection_metadata;
          if (!cm || typeof cm !== "object") continue;
          var raw =
            cm.total_supply != null
              ? cm.total_supply
              : cm.num_assets != null
                ? cm.num_assets
                : cm.collection_size != null
                  ? cm.collection_size
                  : cm.size != null
                    ? cm.size
                    : cm.supply != null
                      ? cm.supply
                      : null;
          if (raw == null) continue;
          var n = Number(raw);
          if (!isNaN(n) && n >= 0) return Math.floor(n);
        }
        return null;
      }

      function assetCollectionMatchesRaiku(item) {
        var names = collectionNameStringsFromAsset(item);
        for (var i = 0; i < names.length; i++) {
          if (names[i].toLowerCase().indexOf(RAIKU_COLLECTION_NEEDLE) !== -1) {
            return true;
          }
        }
        return false;
      }

      function normalizeCollectionNameKey(s) {
        if (s == null) return "";
        return String(s)
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ");
      }

      /**
       * 进度条用：按合集「显示名称」归类（规范化后比较），不比较铸币或资产 id。
       * 优先取名称中含 Raiku 的字段，与列表筛选语义一致。
       */
      function primaryCollectionNameKeyFromAsset(item) {
        var names = collectionNameStringsFromAsset(item);
        if (!names.length) return "";
        var needle = RAIKU_COLLECTION_NEEDLE;
        for (var i = 0; i < names.length; i++) {
          if (names[i].toLowerCase().indexOf(needle) !== -1) {
            return normalizeCollectionNameKey(names[i]);
          }
        }
        return normalizeCollectionNameKey(names[0]);
      }

      function collectionFilterEntriesFromResults(rows) {
        var byKey = new Map();
        rows.forEach(function (row) {
          if (!row || row.error || !Array.isArray(row.filtered)) return;
          row.filtered.forEach(function (item) {
            var names = collectionNameStringsFromAsset(item);
            names.forEach(function (name) {
              var label = String(name || "").trim();
              var key = normalizeCollectionNameKey(label);
              if (!key || byKey.has(key)) return;
              byKey.set(key, label);
            });
          });
        });
        return Array.from(byKey.entries())
          .map(function (entry) {
            return { key: entry[0], label: entry[1] };
          })
          .sort(function (a, b) {
            return a.label.localeCompare(b.label, uiLang === "zh" ? "zh-Hans-CN" : "en", {
              sensitivity: "base",
              numeric: true,
            });
          });
      }

      function assetMatchesCollectionFilter(item, filterKey) {
        if (!filterKey || filterKey === "__all__") return true;
        var names = collectionNameStringsFromAsset(item);
        for (var i = 0; i < names.length; i++) {
          if (normalizeCollectionNameKey(names[i]) === filterKey) return true;
        }
        return false;
      }

      function itemsForCollectionFilter(items, filterKey) {
        if (!Array.isArray(items)) return [];
        if (!filterKey || filterKey === "__all__") return items;
        return items.filter(function (item) {
          return assetMatchesCollectionFilter(item, filterKey);
        });
      }

      function rowsForCollectionFilter(rows) {
        if (!activeCollectionFilterKey || activeCollectionFilterKey === "__all__") {
          return rows;
        }
        return rows.filter(function (row) {
          if (!row || row.error) return false;
          return itemsForCollectionFilter(row.filtered, activeCollectionFilterKey).length > 0;
        });
      }

      function syncCollectionFilterOptions() {
        var entries = collectionFilterEntriesFromResults(resultsBuffer);
        var current = activeCollectionFilterKey || "__all__";
        var hasCurrent = current === "__all__";
        if (!hasCurrent) {
          hasCurrent = entries.some(function (entry) {
            return entry.key === current;
          });
        }
        if (!hasCurrent) {
          current = "__all__";
          activeCollectionFilterKey = current;
        }

        collectionFilterSelect.innerHTML = "";
        var allOpt = document.createElement("option");
        allOpt.value = "__all__";
        allOpt.textContent = t("filterAllCollections");
        collectionFilterSelect.appendChild(allOpt);
        entries.forEach(function (entry) {
          var opt = document.createElement("option");
          opt.value = entry.key;
          opt.textContent = entry.label;
          collectionFilterSelect.appendChild(opt);
        });
        collectionFilterSelect.value = current;
        collectionFilterSelect.disabled = entries.length === 0;
      }

      /**
       * 名称含 Slop 且不含 Anti-Slop 的合集（如 Raiku Slop）不计入进度条。
       */
      function assetIsSlopNftExcludedFromProgress(item) {
        var names = collectionNameStringsFromAsset(item);
        var hasAnti = false;
        var hasSlop = false;
        for (var i = 0; i < names.length; i++) {
          var lo = names[i].toLowerCase();
          if (
            lo.indexOf("anti-slop") !== -1 ||
            lo.indexOf("anti slop") !== -1
          ) {
            hasAnti = true;
          }
          if (lo.indexOf("slop") !== -1) hasSlop = true;
        }
        if (!hasSlop) return false;
        if (hasAnti) return false;
        return true;
      }

      function collectionNameKeySetFromItemsExcludingSlop(items) {
        var set = new Set();
        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          if (assetIsSlopNftExcludedFromProgress(it)) continue;
          var gNames = collectionNameStringsFromAsset(it);
          var isGoldLine = false;
          for (var g = 0; g < gNames.length; g++) {
            if (
              gNames[g].toLowerCase().indexOf(RAIKU_TOWNHALL_GOLD_SUBSTR) !== -1
            ) {
              isGoldLine = true;
              break;
            }
          }
          if (isGoldLine) continue;
          var k = primaryCollectionNameKeyFromAsset(it);
          if (k) set.add(k);
        }
        return set;
      }

      /** 进度条「普通」：与基准键交集时按合集名称（多字段规范化），不要求同合约；排除 Slop / Gold 行规则与基准键一致。 */
      function collectionNameKeySetFromUserItemsForProgress(items) {
        var set = new Set();
        if (!items) return set;
        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          if (assetIsSlopNftExcludedFromProgress(it)) continue;
          var gNames = collectionNameStringsFromAsset(it);
          var isGoldLine = false;
          for (var g = 0; g < gNames.length; g++) {
            if (
              gNames[g].toLowerCase().indexOf(RAIKU_TOWNHALL_GOLD_SUBSTR) !== -1
            ) {
              isGoldLine = true;
              break;
            }
          }
          if (isGoldLine) continue;
          for (var j = 0; j < gNames.length; j++) {
            var nk = normalizeCollectionNameKey(gNames[j]);
            if (nk) set.add(nk);
          }
          var pk = primaryCollectionNameKeyFromAsset(it);
          if (pk) set.add(pk);
        }
        return set;
      }

      function countMatchingCollectionKeys(userItems, benchKeySet) {
        if (!benchKeySet || !benchKeySet.size) return 0;
        var userKeys = collectionNameKeySetFromUserItemsForProgress(userItems);
        var n = 0;
        benchKeySet.forEach(function (k) {
          if (userKeys.has(k)) n++;
        });
        return n;
      }

      function assetIsOfficialRaikuDistribution(item) {
        if (!item) return false;
        var allowed = RAIKU_OFFICIAL_DISTRIBUTOR;
        function eq(addr) {
          return addr != null && String(addr).trim() === allowed;
        }
        if (Array.isArray(item.authorities)) {
          for (var i = 0; i < item.authorities.length; i++) {
            var ad = item.authorities[i] && item.authorities[i].address;
            if (eq(ad)) return true;
          }
        }
        if (Array.isArray(item.creators)) {
          for (var j = 0; j < item.creators.length; j++) {
            var cr = item.creators[j];
            if (cr && cr.verified && eq(cr.address)) return true;
          }
        }
        var ti = item.token_info;
        if (ti && eq(ti.mint_authority)) return true;
        return false;
      }

      /**
       * 名称含 Raiku 的 NFT 必须通过官方分发校验；非 Raiku 名称资产在「未勾选仅 Raiku」时仍保留。
       */
      function filterResultAssets(items, onlyRaikuCollection) {
        var out = [];
        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          var raiku = assetCollectionMatchesRaiku(it);
          var official = assetIsOfficialRaikuDistribution(it);
          if (onlyRaikuCollection) {
            if (raiku && official) out.push(it);
          } else {
            if (!raiku || official) out.push(it);
          }
        }
        return out;
      }

      function countRaikuNamedInList(items) {
        var n = 0;
        for (var i = 0; i < items.length; i++) {
          if (assetCollectionMatchesRaiku(items[i])) n++;
        }
        return n;
      }

      function assetMatchesRaikuTownhallGold(item) {
        var names = collectionNameStringsFromAsset(item);
        for (var i = 0; i < names.length; i++) {
          if (
            names[i].toLowerCase().indexOf(RAIKU_TOWNHALL_GOLD_SUBSTR) !== -1
          ) {
            return true;
          }
        }
        return false;
      }

      function goldTownhallStatsFromItems(items) {
        var collKeys = new Set();
        var nfts = 0;
        for (var i = 0; i < items.length; i++) {
          if (!assetMatchesRaikuTownhallGold(items[i])) continue;
          nfts++;
          var k = primaryCollectionNameKeyFromAsset(items[i]);
          if (k) collKeys.add(k);
        }
        return { collections: collKeys.size, nfts: nfts };
      }

      function countTownhallGoldNftsInItems(items) {
        var n = 0;
        for (var i = 0; i < items.length; i++) {
          if (assetMatchesRaikuTownhallGold(items[i])) n++;
        }
        return n;
      }

      function assetMatchesRaikuAntiSlopNft(item) {
        var names = collectionNameStringsFromAsset(item);
        for (var i = 0; i < names.length; i++) {
          var lo = names[i].toLowerCase();
          if (lo.indexOf(RAIKU_COLLECTION_NEEDLE) === -1) continue;
          if (
            lo.indexOf("anti-slop") !== -1 ||
            lo.indexOf("anti slop") !== -1
          ) {
            return true;
          }
        }
        return false;
      }

      function antiSlopStatsFromItems(items) {
        var collKeys = new Set();
        var nfts = 0;
        for (var i = 0; i < items.length; i++) {
          if (!assetMatchesRaikuAntiSlopNft(items[i])) continue;
          nfts++;
          var k = primaryCollectionNameKeyFromAsset(items[i]);
          if (k) collKeys.add(k);
        }
        return { collections: collKeys.size, nfts: nfts };
      }

      async function rpcCall(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) {
          const msg =
            (data.error.message || t("rpcError")) +
            (data.error.code != null ? " (" + data.error.code + ")" : "");
          throw new Error(msg);
        }
        return data;
      }

      async function fetchAllAssetsForOwner(url, owner) {
        const all = [];
        let page = 1;
        const limit = 1000;
        for (;;) {
          const data = await rpcCall(url, {
            jsonrpc: "2.0",
            id: "cnft-batch-" + page,
            method: "getAssetsByOwner",
            params: {
              ownerAddress: owner,
              page,
              limit,
              sortBy: {
                sortBy: "created",
                sortDirection: "asc",
              },
              options: {
                showFungible: false,
                showNativeBalance: false,
                showCollectionMetadata: true,
                showUnverifiedCollections: true,
              },
            },
          });
          const items = (data.result && data.result.items) || [];
          all.push.apply(all, items);
          if (items.length < limit) break;
          page += 1;
        }
        return sortAssetsByAcquireTimeAsc(all);
      }

      async function fetchAllAssetsByCollectionGroup(url, groupValue) {
        const all = [];
        let page = 1;
        const limit = 1000;
        for (;;) {
          const data = await rpcCall(url, {
            jsonrpc: "2.0",
            id: "cnft-group-" + page,
            method: "getAssetsByGroup",
            params: {
              groupKey: "collection",
              groupValue: groupValue,
              page,
              limit,
              options: {
                showFungible: false,
                showNativeBalance: false,
                showCollectionMetadata: true,
                showUnverifiedCollections: true,
              },
            },
          });
          const items = (data.result && data.result.items) || [];
          all.push.apply(all, items);
          if (items.length < limit) break;
          page += 1;
        }
        return all;
      }

      function collectionGroupValueFromAsset(item) {
        var grouping = item && item.grouping;
        if (!Array.isArray(grouping)) return "";
        for (var i = 0; i < grouping.length; i++) {
          var g = grouping[i];
          if (!g || g.group_key !== "collection") continue;
          return String(g.group_value || g.value || "").trim();
        }
        return "";
      }

      function ownerAddressFromAsset(item) {
        var o = item && item.ownership;
        if (!o || typeof o !== "object") return "";
        return String(o.owner || o.owner_address || "").trim();
      }

      function solscanAccountUrl(addr) {
        return (
          "https://solscan.io/account/" +
          encodeURIComponent(addr) +
          "#portfolio_nfts"
        );
      }

      function solscanNftUrl(item) {
        if (!item || !item.id) return "";
        return "https://solscan.io/token/" + encodeURIComponent(String(item.id));
      }

      function appendCollectProgressRow(card, collectBench) {
        if (!collectBench) return;
        var wrap = document.createElement("div");
        wrap.className = "collect-progress";
        if (collectBench.error) {
          wrap.classList.add("collect-progress--err");
          wrap.textContent = t("collectBenchFail");
          card.appendChild(wrap);
          return;
        }
        if (!collectBench.total) {
          wrap.classList.add("collect-progress--muted");
          wrap.textContent = t("collectBenchEmpty");
          card.appendChild(wrap);
          return;
        }
        var owned = collectBench.owned;
        var pct =
          collectBench.total > 0
            ? Math.min(
                100,
                Math.round((owned * 1000) / collectBench.total) / 10
              )
            : 0;
        var counts = document.createElement("div");
        counts.className = "collect-progress-counts";
        counts.textContent = t("collectProgressCounts", {
          owned: String(owned),
          total: String(collectBench.total),
          pct: String(pct),
        });
        wrap.appendChild(counts);
        var barOuter = document.createElement("div");
        barOuter.className = "collect-progress-bar-wrap";
        barOuter.setAttribute("role", "progressbar");
        barOuter.setAttribute("aria-valuemin", "0");
        barOuter.setAttribute("aria-valuemax", String(collectBench.total));
        barOuter.setAttribute("aria-valuenow", String(owned));
        barOuter.setAttribute(
          "aria-label",
          t("collectProgressCounts", {
            owned: String(owned),
            total: String(collectBench.total),
            pct: String(pct),
          })
        );
        var barFill = document.createElement("div");
        barFill.className = "collect-progress-bar-fill";
        barFill.style.width = pct + "%";
        barOuter.appendChild(barFill);
        wrap.appendChild(barOuter);
        card.appendChild(wrap);
      }

      /** 单条资产的合集名规范化键，用于与基准逐项按「名称」匹配（不要求同合约）。 */
      function collectionKeySetForSingleItem(it) {
        var keys = new Set();
        if (!it) return keys;
        var names = collectionNameStringsFromAsset(it);
        for (var j = 0; j < names.length; j++) {
          var k = normalizeCollectionNameKey(names[j]);
          if (k) keys.add(k);
        }
        var pk = primaryCollectionNameKeyFromAsset(it);
        if (pk) keys.add(pk);
        return keys;
      }

      function userItemMatchesBenchCollection(userItem, benchItem) {
        var a = collectionKeySetForSingleItem(userItem);
        var b = collectionKeySetForSingleItem(benchItem);
        var hit = false;
        b.forEach(function (k) {
          if (a.has(k)) hit = true;
        });
        return hit;
      }

      function benchRefCollectionLabel(item) {
        var cns = collectionNameStringsFromAsset(item);
        if (cns.length) return cns.join(" · ");
        var raw = assetDisplayName(item);
        return String(raw)
          .replace(/\s*#\d+\s*$/i, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function collectionLabelForRow(item) {
        var collNames = collectionNameStringsFromAsset(item);
        if (collNames.length) return collNames.join(" · ");
        return t("noCollection");
      }

      function appendSolscanLink(target, item) {

      function appendAntiSlopBanner(card, collectionCount, nftCount) {

        var title = document.createElement("div");
        title.className = "raiku-anti-slop-banner-title";
        title.textContent = t("antiSlopTitle");
        wrap.appendChild(title);
        var detail = document.createElement("div");
        detail.className = "raiku-anti-slop-banner-detail";
        detail.textContent = t("antiSlopDetail", {
          colls: String(collectionCount),
          nfts: String(nftCount),
        });
        wrap.appendChild(detail);
        card.appendChild(wrap);
      }

      function collectBenchIsFullyComplete(collectBench) {
        return (
          collectBench &&
          !collectBench.error &&
          collectBench.total > 0 &&
          collectBench.owned >= collectBench.total
        );
      }

      /** 与 Anti-Slop 同款绿色横幅，用于收集进度 100%。 */
      function appendCollectCompleteBanner(card) {
        var wrap = document.createElement("div");
        wrap.className = "raiku-anti-slop-banner";
        wrap.setAttribute("role", "status");
        var title = document.createElement("div");
        title.className = "raiku-anti-slop-banner-title";
        title.textContent = t("collectCompleteTitle");
        wrap.appendChild(title);
        var detail = document.createElement("div");
        detail.className = "raiku-anti-slop-banner-detail";
        detail.textContent = t("collectCompleteDetail");
        wrap.appendChild(detail);
        card.appendChild(wrap);
      }

      function prefersReducedMotionUi() {
        try {
          return (
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches
          );
        } catch (e) {
          return false;
        }
      }

      /** 任一地址的结果里存在名称含 Raiku 且已通过官方分发校验的 NFT 时为 true。 */
      function resultsBufferHasAnyRaikuNft(rows) {
        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          if (r.error || !r.filtered || !r.filtered.length) continue;
          for (var j = 0; j < r.filtered.length; j++) {
            if (assetCollectionMatchesRaiku(r.filtered[j])) return true;
          }
        }
        return false;
      }

      function showGoldConfettiCelebration() {
        if (prefersReducedMotionUi()) return;
        var old = document.querySelector(".gold-confetti-layer");
        if (old) old.remove();
        var layer = document.createElement("div");
        layer.className = "gold-confetti-layer";
        layer.setAttribute("aria-hidden", "true");
        document.body.appendChild(layer);
        var colors = [
          "#FFD700",
          "#FFEC8B",
          "#FFC107",
          "#E6C200",
          "#98FB98",
          "#7FFFD4",
          "#DDA0DD",
          "#FF8DA1",
          "#87CEFA",
          "#F0E68C",
        ];
        var n = 76;
        for (var i = 0; i < n; i++) {
          var p = document.createElement("div");
          p.className = "gold-confetti-piece";
          p.style.background = colors[i % colors.length];
          p.style.left = Math.random() * 100 + "%";
          p.style.width = 6 + Math.random() * 9 + "px";
          p.style.height = 7 + Math.random() * 12 + "px";
          p.style.animationDuration = 2.1 + Math.random() * 2.4 + "s";
          p.style.animationDelay = Math.random() * 0.45 + "s";
          p.style.setProperty("--dx", Math.random() * 140 - 70 + "px");
          p.style.setProperty("--rot", Math.random() * 1440 - 720 + "deg");
          layer.appendChild(p);
        }
        window.setTimeout(function () {
          layer.classList.add("gold-confetti-layer--out");
          window.setTimeout(function () {
            layer.remove();
          }, 560);
        }, 4000);
      }

      function renderCard(
        addr,
        filtered,
        rawCount,
        error,
        addressNo,
        postCompressCount,
        collectBench,
        raikuMatchCount,
        displayMode
      ) {
        const card = document.createElement("div");
        card.className = "card";

        const head = document.createElement("div");
        head.className = "card-head";

        const main = document.createElement("div");
        main.className = "head-main";

        const serial = document.createElement("span");
        serial.className = "addr-serial";
        serial.textContent = addressNo + ".";
        main.appendChild(serial);

        const addrWrap = document.createElement("div");
        addrWrap.className = "addr";
        const a = document.createElement("a");
        a.href = solscanAccountUrl(addr);
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = addr;
        addrWrap.appendChild(a);
        main.appendChild(addrWrap);
        head.appendChild(main);

        const badge = document.createElement("span");
        badge.className = "badge";
        if (error) {
          badge.classList.add("err");
          badge.textContent = t("badgeFailed");
        } else {
          badge.classList.add("ok");
          badge.textContent = t("badgeOk", {
            n: String(filtered.length),
          });
        }
        head.appendChild(badge);

        card.appendChild(head);

        appendCollectProgressRow(card, collectBench);

        if (!error && collectBenchIsFullyComplete(collectBench)) {
          appendCollectCompleteBanner(card);
        }

        if (!error && filtered.length) {
          var gts = goldTownhallStatsFromItems(filtered);
          if (gts.nfts > 0) {
            appendGoldTownhallBanner(card, gts.collections, gts.nfts);
          }
          var as = antiSlopStatsFromItems(filtered);
          if (as.nfts > 0) {
            appendAntiSlopBanner(card, as.collections, as.nfts);
          }
        }

        const body = document.createElement("div");
        body.className = "card-body";

        if (error) {
          const err = document.createElement("div");
          err.className = "err-msg";
          err.textContent = error;
          body.appendChild(err);
        } else {
          var useBench =
            !lastBenchmarkFetchError &&
            lastBenchmarkItemsRef &&
            lastBenchmarkItemsRef.length > 0;

          if (filtered.length === 0 && !useBench) {
            const empty = document.createElement("div");
            empty.className = "empty-nft";
            let emptyMsg = t("emptyDefault");
            if (raikuMatchCount > 0) {
              emptyMsg = t("emptyRaikuUnofficial");
            } else if (
              onlyRaikuCollectionEl.checked &&
              postCompressCount > 0
            ) {
              emptyMsg = t("emptyRaiku");
            } else if (
              onlyCompressedEl.checked &&
              rawCount > 0 &&
              postCompressCount === 0
            ) {
              emptyMsg = t("emptyCnft");
            }
            empty.textContent = emptyMsg;
            body.appendChild(empty);
          } else {
            const ul = document.createElement("ul");
            ul.className = "nft-list";
            if (displayMode === "rows") ul.classList.add("nft-list--rows");
            if (useBench) {
              var benchItemsForView = itemsForCollectionFilter(
                lastBenchmarkItemsRef,
                activeCollectionFilterKey
              );
              var consumedIdx = new Set();
              var rowI = 0;
              benchItemsForView.forEach(function (benchItem) {
                var matchIdx = -1;
                for (var mi = 0; mi < filtered.length; mi++) {
                  if (consumedIdx.has(mi)) continue;
                  var u = filtered[mi];
                  if (userItemMatchesBenchCollection(u, benchItem)) {
                    matchIdx = mi;
                    break;
                  }
                }
                if (matchIdx >= 0) {
                  consumedIdx.add(matchIdx);
                  appendNftListRow(
                    ul,
                    filtered[matchIdx],
                    rowI,
                    false,
                    displayMode
                  );
                  rowI++;
                } else {
                  appendNftListRow(ul, benchItem, rowI, true, displayMode);
                  rowI++;
                }
              });
              filtered.forEach(function (u, ui) {
                if (consumedIdx.has(ui)) return;
                appendNftListRow(ul, u, rowI, false, displayMode);
                rowI++;
              });
            } else {
              filtered.forEach(function (item, i) {
                appendNftListRow(ul, item, i, false, displayMode);
              });
            }
            body.appendChild(ul);
          }
        }

        card.appendChild(body);
        return card;
      }

      function renderResultsView() {
        if (resultsBuffer.length === 0) {
          resultsMetaEl.hidden = true;
          resultsEl.innerHTML = "";
          return;
        }

        resultsMetaEl.hidden = false;
        syncCollectionFilterOptions();
        const displayRows = rowsForCollectionFilter(resultsBuffer);

        resultsEl.innerHTML = "";
        displayRows.forEach(function (row) {
          var cardItems = itemsForCollectionFilter(
            row.filtered,
            activeCollectionFilterKey
          );
          resultsEl.appendChild(
            renderCard(
              row.addr,
              cardItems,
              row.rawCount,
              row.error,
              row.addressNo,
              row.postCompressCount,
              row.collectBench,
              row.raikuMatchCount != null ? row.raikuMatchCount : 0,
              nftDisplayMode
            )
          );
        });
      }

      collectionFilterSelect.addEventListener("change", function () {
        activeCollectionFilterKey = collectionFilterSelect.value || "__all__";
        renderResultsView();
      });

      displayModeSelect.addEventListener("change", function () {
        nftDisplayMode =
          displayModeSelect.value === "rows" ? "rows" : "grid";
        renderResultsView();
      });

      btnClear.addEventListener("click", function () {
        resultsBuffer = [];
        activeCollectionFilterKey = "__all__";
        syncCollectionFilterOptions();
        resultsMetaEl.hidden = true;
        resultsEl.innerHTML = "";
        progressEl.textContent = "";
        document.querySelectorAll(".gold-confetti-layer").forEach(function (el) {
          el.remove();
        });
        lastBenchmarkItemsRef = [];
        lastBenchmarkFetchError = null;
      });

      btnRun.addEventListener("click", async function () {
        const addrs = parseAddresses(addressesEl.value);
        if (addrs.length === 0) {
          alert(t("alertNoAddresses"));
          return;
        }

        const bad = addrs.filter(function (a) {
          return !SOLANA_ADDR_RE.test(a);
        });
        if (bad.length) {
          alert(t("alertBadAddrPrefix") + "\n" + bad.slice(0, 5).join("\n"));
          return;
        }

        if (!getHeliusApiKey()) {
          alert(t("alertApiConfig"));
          return;
        }

        let needPwdModal = false;
        let pwdReason = "";
        let coolDetail = "";
        if (addrs.length >= BATCH_QUERY_MIN_ADDRS) {
          needPwdModal = true;
          pwdReason = "batch";
        } else {
          const cool = checkMinuteCooldown();
          if (!cool.ok) {
            needPwdModal = true;
            pwdReason = "cooldown";
            coolDetail = cool.msg;
          }
        }

        if (needPwdModal) {
          const entered = await openPasswordModal(pwdReason, coolDetail);
          if (entered === null) {
            return;
          }
          if (!entered) {
            alert(t("alertPwdEmpty"));
            return;
          }
          if (entered !== BATCH_PASSWORD) {
            alert(t("alertPwdWrong"));
            return;
          }
        } else {
          touchMinuteCooldown();
        }

        const url = heliusUrl();
        const onlyCompressed = onlyCompressedEl.checked;
        const onlyRaikuCollection = onlyRaikuCollectionEl.checked;

        resultsBuffer = [];
        activeCollectionFilterKey = "__all__";
        syncCollectionFilterOptions();
        resultsEl.innerHTML = "";
        resultsMetaEl.hidden = true;
        btnRun.disabled = true;
        btnClear.disabled = true;

        progressEl.textContent = "";
        lastBenchmarkItemsRef = [];
        lastBenchmarkFetchError = null;
        var benchCollectionKeys = new Set();
        var benchGoldTarget = 0;
        var benchError = null;
        try {
          var refRaw = await fetchAllAssetsForOwner(
            url,
            RAIKU_BENCHMARK_WALLET
          );
          var refAfter = filterItems(refRaw, onlyCompressed);
          var refFiltered = filterResultAssets(refAfter, onlyRaikuCollection);
          benchCollectionKeys =
            collectionNameKeySetFromItemsExcludingSlop(refFiltered);
          benchGoldTarget = countTownhallGoldNftsInItems(refFiltered);
          lastBenchmarkItemsRef = refFiltered.slice();
        } catch (e) {
          benchError = e.message || String(e);
          lastBenchmarkFetchError = benchError;
          lastBenchmarkItemsRef = [];
        }

        for (let i = 0; i < addrs.length; i++) {
          const addr = addrs[i];
          progressEl.textContent = t("progressQuerying", {
            cur: String(i + 1),
            total: String(addrs.length),
            short: addr.slice(0, 8),
          });

          try {
            const raw = await fetchAllAssetsForOwner(url, addr);
            const afterCompressed = filterItems(raw, onlyCompressed);
            var raikuMatchCount = countRaikuNamedInList(afterCompressed);
            const filtered = filterResultAssets(
              afterCompressed,
              onlyRaikuCollection
            );
            var collectBench = benchError
              ? { error: benchError, owned: 0, total: 0 }
              : (function () {
                  /* 总数 = 基准普通(合集键数) + 基准 Gold 件数；已收集 = 用户普通(与基准键交集) + 用户 Gold 件数 */
                  var total =
                    benchCollectionKeys.size + benchGoldTarget;
                  var normalOwned = countMatchingCollectionKeys(
                    filtered,
                    benchCollectionKeys
                  );
                  var goldOwned = countTownhallGoldNftsInItems(filtered);
                  return {
                    error: null,
                    owned: normalOwned + goldOwned,
                    total: total,
                  };
                })();
            resultsBuffer.push({
              addr: addr,
              filtered: filtered,
              rawCount: raw.length,
              postCompressCount: afterCompressed.length,
              error: null,
              addressNo: i + 1,
              collectBench: collectBench,
              raikuMatchCount: raikuMatchCount,
            });
          } catch (e) {
            resultsBuffer.push({
              addr: addr,
              filtered: [],
              rawCount: 0,
              postCompressCount: 0,
              error: e.message || String(e),
              addressNo: i + 1,
              collectBench: null,
              raikuMatchCount: 0,
            });
          }
        }

        progressEl.textContent = t("progressDone", {
          total: String(addrs.length),
        });
        renderResultsView();
        if (resultsBufferHasAnyRaikuNft(resultsBuffer)) {
          showGoldConfettiCelebration();
        }
        btnRun.disabled = false;
        btnClear.disabled = false;
      });

      applyStaticI18n();
      preloadBenchmarkChartImages();
      loadTotalUniqueHolders();

    })();
  </script>
</body>
</html>
